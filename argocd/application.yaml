apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/shankarmutkekar-sonnet/agentic-sre
    targetRevision: master
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: flask-app

  syncPolicy:
    automated:
      prune: true      # remove resources deleted from Git
      selfHeal: true   # re-sync if cluster drifts from Git
    syncOptions:
      - CreateNamespace=true
