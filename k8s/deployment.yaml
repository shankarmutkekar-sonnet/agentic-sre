apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-app
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          # IMAGE_TAG is updated by CI (GitHub Actions) on every push to master.
          # ArgoCD detects the Git change and syncs the cluster automatically.
          image: 682975283486.dkr.ecr.eu-north-1.amazonaws.com/agentic-sre-flask:fec85d80f32dff615bb33753ffe21c085007e669
          ports:
            - containerPort: 5000
          env:
            - name: SPLUNK_HEC_URL
              valueFrom:
                secretKeyRef:
                  name: flask-app-secrets
                  key: splunk-hec-url
                  optional: true
            - name: SPLUNK_HEC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: flask-app-secrets
                  key: splunk-hec-token
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
